apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-drupal
  labels:
    {{- include "drupal.release_labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "drupal.release_selector_labels" . | nindent 6 }}
      deployment: drupal
  strategy:
    {{- if eq (.Values.deploymentStrategy | default "RollingUpdate") "Recreate" }}
    type: Recreate
    {{- else }}
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0%
      maxSurge: 50%
    {{- end }}
  template:
    metadata:
      labels:
        {{- include "drupal.release_labels" . | nindent 8 }}
        deployment: drupal
        silta-ingress: allow
      annotations:
        # Recreate pods when the configMap or secret changes.
        configMap-checksum: {{ include (print $.Template.BasePath "/drupal-configmap.yaml") . | sha256sum }}
        secrets-checksum: {{ include (print $.Template.BasePath "/drupal-secret.yaml") . | sha256sum }}
        {{- if .Values.shell.enabled }}
        shell-cm-checksum: {{ include (print $.Template.BasePath "/shell-configmap.yaml") . | sha256sum }}
        shell-sec-checksum: {{ include (print $.Template.BasePath "/shell-secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      enableServiceLinks: false
      initContainers:
      # Fix ownership of PVC-mounted data directories for www-data (uid/gid 82).
      # ReadWriteOnce block storage creates directories owned by root:root.
      # We chown only user-data mounts (not ssh-keys, which sshd requires 0600).
      - name: fix-volume-permissions
        image: busybox:stable
        command: ['sh', '-c']
        args:
          - |
            {{- range $index, $mount := $.Values.mounts }}
            {{- if eq $mount.enabled true }}
            chown -R 82:82 {{ $mount.mountPath }} || true
            {{- end }}
            {{- end }}
        volumeMounts:
          {{- range $index, $mount := $.Values.mounts }}
          {{- if eq $mount.enabled true }}
          - name: drupal-{{ $index }}
            mountPath: {{ $mount.mountPath }}
          {{- end }}
          {{- end }}
        securityContext:
          runAsUser: 0
      containers:
      # php-fpm container.
      - name: php
        {{- include "drupal.php-container" . | nindent 8}}
        volumeMounts:
          {{- include "drupal.volumeMounts" . | nindent 10 }}
          - name: config
            mountPath: /php-fpm-probe.sh
            subPath: php-fpm-probe.sh
        livenessProbe:
          tcpSocket:
            port: 9000
        readinessProbe:
          exec:
            command: ['/bin/bash', '-c', '/php-fpm-probe.sh']
        lifecycle:
          preStop:
            exec:
              command: [ "/bin/sleep", "15" ]
        {{- if .Values.php.resources }}
        resources:
          {{- .Values.php.resources | toYaml | nindent 10 }}
        {{- end }}

      # Nginx container
      - name: nginx
        image: {{ .Values.nginx.image | quote }}
        env:
        - name: RELEASE_NAME
          value: "{{ .Release.Name }}"
        - name: PROJECT_NAME
          value: "{{ .Values.projectName | default .Release.Namespace }}"
        {{- if .Values.timezone }}
        - name: TZ
          value: {{ .Values.timezone | quote }}
        {{- end }}
        ports:
        - containerPort: 8080
          name: drupal
        volumeMounts:
        {{- range $index, $mount := $.Values.mounts }}
        {{- if eq $mount.enabled true }}
        - name: drupal-{{ $index }}
          mountPath: {{ $mount.mountPath }}
          readOnly: true
        {{- end }}
        {{- end }}
        - name: config
          mountPath: /etc/nginx/nginx.conf
          readOnly: true
          subPath: nginx_conf
        - name: config
          mountPath: /etc/nginx/conf.d/drupal.conf
          readOnly: true
          subPath: drupal_conf
        - name: config
          mountPath: /etc/nginx/fastcgi.conf
          readOnly: true
          subPath: fastcgi_conf
        {{- if .Values.nginx.status_page.enabled }}
        - name: config
          mountPath: /etc/nginx/modules/nginx_status.conf
          readOnly: true
          subPath: nginx_status_conf
        {{- end }}
        {{- if .Values.signalsciences.enabled }}
        - name: config
          mountPath: /etc/nginx/modules/nginx_signalsciences.conf
          readOnly: true
          subPath: nginx_signalsciences_conf
        - name: sigsci-tmp
          mountPath: /sigsci/tmp
        {{- end }}  
        {{- if .Values.nginx.extraConfig }}
        - name: config
          # provide empty configuration file in /etc/nginx/conf.d for users to populate
          mountPath: /etc/nginx/conf.d/misc.conf
          readOnly: true
          subPath: extraConfig
        {{- end }}
        {{- if .Values.nginx.basicauth.enabled }}
        - name: nginx-basicauth
          mountPath: /etc/nginx/.htaccess
          readOnly: true
          subPath: .htaccess
        {{- end }}
        livenessProbe:
          tcpSocket:
            port: 8080
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sleep", "15"]
        {{- if .Values.nginx.resources }}
        resources:
          {{- .Values.nginx.resources | toYaml | nindent 10 }}
        {{- end }}

      {{- if .Values.shell.enabled }}
      # Shell sidecar container — shares all volume mounts with php-fpm for drush/CLI access.
      - name: shell
        image: {{ .Values.shell.image | quote }}
        # Shell entrypoint configures SSH host keys and sshd — requires root.
        securityContext:
          runAsUser: 0
        env:
        {{- include "drupal.env" . | indent 8 }}
        {{- if .Values.shell.gitAuth.keyserver.enabled }}
        - name: GITAUTH_URL
          value: {{ .Values.shell.gitAuth.keyserver.url | default (printf "https://keys.%s/api/1/git-ssh-keys" .Values.clusterDomain) | quote }}
        - name: GITAUTH_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets-shell
              key: keyserver.username
        - name: GITAUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets-shell
              key: keyserver.password
        - name: GITAUTH_SCOPE
          value: {{ .Values.shell.gitAuth.repositoryUrl }}
        - name: OUTSIDE_COLLABORATORS
          value: {{ .Values.shell.gitAuth.outsideCollaborators | default true | quote }}
        {{- end }}
        ports:
          - containerPort: 22
        volumeMounts:
        {{- include "drupal.volumeMounts" . | nindent 8 }}
        - name: ssh-keys
          mountPath: /etc/ssh/keys
        - name: shell-configmap
          mountPath: /etc/ssh/authorized_keys
          subPath: authorizedKeys
          readOnly: true
        {{- if .Values.backup.enabled }}
        - name: {{ .Release.Name }}-backup
          mountPath: /backups
          readOnly: true
        {{- end }}
        {{- if or $.Values.shell.resources .Values.php.resources }}
        resources:
          {{- merge .Values.shell.resources .Values.php.resources | toYaml | nindent 10 }}
        {{- end }}
      {{- end }}

      {{- if .Values.signalsciences.enabled }}
      # Signal Services container
      - name: sigsci
        image: {{ .Values.signalsciences.image }}:{{ .Values.signalsciences.imageTag }}
        imagePullPolicy: IfNotPresent
        env:
        - name: SIGSCI_ACCESSKEYID
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets-drupal
              key: signalsciences_accesskeyid
        - name: SIGSCI_SECRETACCESSKEY
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets-drupal
              key: signalsciences_secretaccesskey
        securityContext:
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: sigsci-tmp
          mountPath: /sigsci/tmp
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sleep", "30"]
        {{- if .Values.signalsciences.resources }}
        resources:
          {{- .Values.signalsciences.resources | toYaml | nindent 10 }}
        {{- end }}
      {{- end }}

      volumes:
        {{- include "drupal.volumes" . | nindent 8}}
        {{- if .Values.shell.enabled }}
        - name: ssh-keys
          persistentVolumeClaim:
            {{- if and ( eq $.Values.shell.mount.storageClassName "silta-shared" ) ( eq ( include "silta-cluster.rclone.has-provisioner" $ ) "true" ) }}
            claimName: {{ .Release.Name }}-ssh-keys2
            {{- else }}
            claimName: {{ .Release.Name }}-ssh-keys
            {{- end }}
        - name: shell-configmap
          configMap:
            name: {{ .Release.Name }}-shell
        {{- if .Values.backup.enabled }}
        - name: {{ .Release.Name }}-backup
          persistentVolumeClaim:
            {{- if and ( eq $.Values.backup.storageClassName "silta-shared" ) ( eq ( include "silta-cluster.rclone.has-provisioner" $ ) "true" ) }}
            claimName: {{ .Release.Name }}-backup2
            {{- else }}
            claimName: {{ .Release.Name }}-backup
            {{- end }}
        {{- end }}
        {{- end }}
        {{- if .Values.nginx.basicauth.enabled }}
        - name: nginx-basicauth
          secret:
            secretName: {{ .Release.Name }}-secrets-drupal
            items:
              - key: .htaccess
                path: .htaccess
        {{- end }}
        {{- if .Values.signalsciences.enabled }}
        - name: sigsci-tmp
          emptyDir: {}
        {{- end }}
      serviceAccountName: {{ include "drupal.serviceAccountName" . }}
      {{- if .Values.php.nodeSelector }}
      nodeSelector:
        {{- .Values.php.nodeSelector | toYaml | nindent 8 }}
      {{- end }}
      {{- if or .Values.php.tolerations (include "drupal.tolerations" .Values.php.nodeSelector) }}
      tolerations:
        {{- include "drupal.tolerations" .Values.php.nodeSelector | nindent 8 }}
        {{- if .Values.php.tolerations }}
        {{- .Values.php.tolerations | toYaml | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- if .Values.php.affinity }}
      affinity:
        {{- tpl ( .Values.php.affinity | toYaml ) . | nindent 8 }} 
      {{- end }}
---
{{- if .Values.autoscaling.enabled }}
apiVersion: {{ include "drupal.autoscaling.api-version" . | trim }}
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-drupal
  labels:
    {{- include "drupal.release_labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-drupal
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  {{- if .Values.autoscaling.metrics }}
  metrics:
  {{- if eq ( include "drupal.autoscaling.api-version" . | trim ) "autoscaling/v2beta1" }}
  {{- range .Values.autoscaling.metrics }}
  - type: Resource
    resource:
      name: {{ .resource.name }}
      {{- if .resource.targetAverageUtilization }}
      targetAverageUtilization: {{ .resource.targetAverageUtilization }}
      {{- end }}
  {{- end }}
  {{- end }}
  {{- if eq ( include "drupal.autoscaling.api-version" . | trim ) "autoscaling/v2" }}
  {{- range .Values.autoscaling.metrics }}
  - type: Resource
    resource:
      name: {{ .resource.name }}
      {{- if .resource.targetAverageUtilization }}
      target:
        type: Utilization
        averageUtilization: {{ .resource.targetAverageUtilization }}
      {{- end }}
  {{- end }}
  {{- end }}
  {{- end }}
{{- end }}
