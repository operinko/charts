{{- if eq .Values.ingress.default.type "traefik" }}
{{- if .Values.ingress.default.tls }}
{{- if has .Values.ssl.issuer (list "letsencrypt" "letsencrypt-staging") }}
{{- $mainDomain := include "drupal.domain" . | trim }}
{{- $gateway := .Values.gateway }}
---
# Certificate for the main drupal domain, issued into the Gateway namespace so
# the main Gateway can reference it from its TLS listener.
# cert-manager creates the secret in the same namespace as this Certificate.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-tls
  namespace: {{ $gateway.namespace }}
  annotations:
    cert-manager.io/issue-temporary-certificate: "true"
  labels:
    {{- include "drupal.release_labels" . | nindent 4 }}
spec:
  secretName: {{ .Release.Name }}-tls
  dnsNames:
    - {{ $mainDomain | quote }}
    {{- range $index, $prefix := .Values.domainPrefixes }}
    {{- $params := dict "prefix" $prefix }}
    - '{{ template "drupal.domain" (merge $params $ ) }}'
    {{- end }}
  issuerRef:
    name: {{ .Values.ssl.issuer }}
    kind: ClusterIssuer
  privateKey:
    rotationPolicy: Always
{{- if .Values.mailpit.enabled }}
{{- $mailpitHostname := printf "%s.%s" .Values.mailpit.httproute.prefix $mainDomain }}
---
# Certificate for the Mailpit UI hostname, also in the Gateway namespace.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-mailpit-tls
  namespace: {{ $gateway.namespace }}
  annotations:
    cert-manager.io/issue-temporary-certificate: "true"
  labels:
    {{- include "drupal.release_labels" . | nindent 4 }}
spec:
  secretName: {{ .Release.Name }}-mailpit-tls
  dnsNames:
    - {{ $mailpitHostname | quote }}
  issuerRef:
    name: {{ .Values.ssl.issuer }}
    kind: ClusterIssuer
  privateKey:
    rotationPolicy: Always
{{- end }}
{{- end }}
{{- end }}
{{- end }}
